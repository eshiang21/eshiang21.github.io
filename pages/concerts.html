<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concerts — Eddie</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="../index.html">Eddie</a>
    <ul class="nav-links">
      <li><a href="concerts.html">Concerts</a></li>
      <li><a href="travel.html">Travel</a></li>
      <li><a href="other.html">Other</a></li>
    </ul>
  </nav>

  <main>
    <header class="page-header">
      <h1>Concerts</h1>
      <p>Live music, captured. Compilation videos from shows over the years.</p>
    </header>

    <section class="section">
      <div class="section-label">
        <span>All shows</span>
        <span class="section-count" id="count"></span>
      </div>
      <div class="video-grid" id="concert-grid"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      <div class="modal-video">
        <iframe id="modal-iframe" title="Concert video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <p class="modal-title" id="modal-title"></p>
        <div class="modal-meta">
          <span id="modal-artist"></span>
          <span class="byline-dot">•</span>
          <span id="modal-venue"></span>
          <span class="byline-dot">•</span>
          <span id="modal-date"></span>
          <span class="price-tag" id="modal-price"></span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <span>Eddie</span>
    <span id="year"></span>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    document.getElementById('year').textContent = '© ' + new Date().getFullYear();

    const concerts = [
      { title: "Dancing with the Stars: Live! — 2026 Tour", youtubeId: "S0O4gO7IXL0", artist: "Dancing with the Stars", venue: "Radio City Music Hall", city: "New York, NY", date: "Feb 15, 2026", price: "$189" },
      { title: "That's Showbiz Baby! The Tour", youtubeId: "1kIIdGV1ubA", artist: "Jade", venue: "The Fillmore", city: "Philadelphia, PA", date: "Feb 16, 2026", price: "$50" },
      { title: "[This Is For] World Tour", youtubeId: "xeeiFQuzFss", artist: "Twice", venue: "UBS Arena", city: "New York, NY", date: "Feb 20, 2026", price: "$56" },
      { title: "Wishbone World Tour", youtubeId: "4-VDulM2GVs", artist: "Conan Gray", venue: "Prudential Center", city: "Newark, NJ", date: "Feb 27, 2026", price: "$136" },
      { title: "The MAYHEM Ball", youtubeId: "XMfMK5laeNA", artist: "Lady Gaga", venue: "Madison Square Garden", city: "New York, NY", date: "Mar 18, 2026", price: "$452" },
      { title: "Little Miss Drama Tour", youtubeId: "pfMTQIaVPz0", artist: "Cardi B", venue: "Madison Square Garden", city: "New York, NY", date: "Mar 26, 2026", price: "$80" },
    ];

    document.getElementById('count').textContent = concerts.length + ' videos';

    const grid = document.getElementById('concert-grid');
    concerts.forEach((c, i) => {
      grid.insertAdjacentHTML('beforeend', `
        <article class="video-card" data-index="${i}">
          <div class="card-thumb">
            <img src="https://img.youtube.com/vi/${c.youtubeId}/hqdefault.jpg" alt="${c.title}" loading="lazy" />
            <div class="card-overlay">
              <p class="card-artist">${c.artist}</p>
              <p class="card-title">${c.title}</p>
            </div>
          </div>
        </article>
      `);
    });

    grid.addEventListener('click', e => {
      const card = e.target.closest('.video-card');
      if (!card) return;
      const c = concerts[card.dataset.index];
      document.getElementById('modal-iframe').src =
        `https://www.youtube.com/embed/${c.youtubeId}?autoplay=1`;
      document.getElementById('modal-title').textContent = c.title;
      document.getElementById('modal-artist').textContent = c.artist;
      document.getElementById('modal-venue').textContent = `${c.venue}, ${c.city}`;
      document.getElementById('modal-date').textContent = c.date;
      document.getElementById('modal-price').textContent = c.price;
      document.getElementById('modal-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
      document.getElementById('modal-iframe').src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-backdrop').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
