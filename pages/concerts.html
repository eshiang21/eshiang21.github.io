<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concerts — Eddie</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="../index.html">Eddie</a>
    <ul class="nav-links">
      <li><a href="concerts.html">Concerts</a></li>
      <li><a href="travel.html">Travel</a></li>
      <li><a href="other.html">Other</a></li>
    </ul>
  </nav>

  <main>
    <header class="page-header">
      <h1>Concerts</h1>
      <p>Live music, captured. Compilation videos from shows over the years.</p>
    </header>

    <section class="section">
      <div class="section-label">
        <span id="section-title">All shows</span>
        <span class="section-count" id="count"></span>
      </div>
      <div class="filter-bar" id="filter-bar">
        <select class="filter-select" id="filter-artist"><option value="">All Artists</option></select>
        <select class="filter-select" id="filter-year"><option value="">All Years</option></select>
        <select class="filter-select" id="filter-venue"><option value="">All Venues</option></select>
        <select class="filter-select" id="filter-city"><option value="">All Cities</option></select>
        <select class="filter-select" id="filter-category"><option value="">All Categories</option></select>
        <button class="filter-clear" id="filter-clear">Clear filters</button>
      </div>
      <div class="video-grid" id="concert-grid"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      <div class="modal-video">
        <iframe id="modal-iframe" title="Concert video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <p class="modal-title" id="modal-title"></p>
        <p class="modal-artist-name" id="modal-artist"></p>
        <p class="modal-venue-name" id="modal-venue"></p>
        <p class="modal-date-text" id="modal-date"></p>
        <div class="modal-divider"></div>
        <div class="modal-meta">
          <span id="modal-category"></span>
          <span class="byline-dot">•</span>
          <span id="modal-purchase-method"></span>
          <span class="byline-dot">•</span>
          <span id="modal-purchase-timing"></span>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-extras">
          <p class="modal-extra-label">Thoughts</p>
          <p class="modal-extra-value" id="modal-thoughts"></p>
          <p class="modal-extra-label">Favorite Song</p>
          <p class="modal-extra-value" id="modal-favorite-song"></p>
          <p class="modal-extra-label">Fun Fact</p>
          <p class="modal-extra-value" id="modal-fun-fact"></p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <span>Eddie</span>
    <span id="year"></span>
  </footer>

  <script src="../js/main.js"></script>

      { title: "A Matter of Time Tour", youtubeId: "dIEeEjkm1i8", image: "/images/concerts/a_matter_of_time_tour.png", artist: "Laufey", venue: "Madison Square Garden", city: "New York, NY", date: "Oct 15 & 16, 2025", purchaseMethod: "Ticketmaster", purchaseTiming: "Planned", category: "Jazz", thoughts: "", favoriteSong: "", funFact: "" },

      { title: "LOVE IS LIKE Tour", youtubeId: "WD95s5VKwd8", image: "/images/concerts/love_is_like_tour.png", artist: "Maroon 5", venue: "Madison Square Garden", city: "New York, NY", date: "Nov 19, 2025", purchaseMethod: "Box Office", purchaseTiming: "Day Of", category: "Pop", thoughts: "", favoriteSong: "", funFact: "" },
      { title: "Z100's Jingle Ball", youtubeId: "2KwOZPcjLxw", image: "/images/concerts/z100s_jingle_ball.png", artist: "Jingle Ball", venue: "Madison Square Garden", city: "New York, NY", date: "Dec 12, 2025", purchaseMethod: "Resale", purchaseTiming: "Day Of", category: "Festival", thoughts: "", favoriteSong: "", funFact: "" },
      { title: "Andrea Bocelli", youtubeId: "u_ER19jpwxM", image: "/images/concerts/andrea_bocelli.png", artist: "Andrea Bocelli", venue: "Madison Square Garden", city: "New York, NY", date: "Dec 17, 2025", purchaseMethod: "Resale", purchaseTiming: "Day Of", category: "Classical", thoughts: "", favoriteSong: "", funFact: "" },
      { title: "Dancing With The Stars: Live! — 2026 Tour", youtubeId: "S0O4gO7IXL0", image: "/images/concerts/dancing_with_the_stars_live_2026_tour.png", artist: "Dancing with the Stars", venue: "Radio City Music Hall", city: "New York, NY", date: "Feb 15, 2026", purchaseMethod: "Ticketmaster", purchaseTiming: "Day Of", category: "Dance", thoughts: "Val was a standout.", favoriteSong: "WHERE IS MY HUSBAND!", funFact: "Big recent demographic shift to young Caucasian females (def from TikTok)." },
      { title: "That's Showbiz Baby! The Tour", youtubeId: "1kIIdGV1ubA", image: "/images/concerts/thats_showbiz_baby_the_tour.png", artist: "Jade", venue: "The Fillmore", city: "Philadelphia, PA", date: "Feb 16, 2026", purchaseMethod: "Resale", purchaseTiming: "Planned", category: "Pop", thoughts: "Intimate venue (but low budget). Hoping she gets a breakout hit soon, so underrated!", favoriteSong: "Plastic Box", funFact: "Same day trip from NYC (Amtrak in morning, chilled at Wharton, late evening Peter Pan bus back)." },
      { title: "[This Is For] World Tour", youtubeId: "xeeiFQuzFss", image: "/images/concerts/this_is_for_world_tour.png", artist: "Twice", venue: "UBS Arena", city: "New York, NY", date: "Feb 20, 2026", purchaseMethod: "Resale", purchaseTiming: "Day Of", category: "K-Pop", thoughts: "Nayeon seemed sad, but Jihyo killed it!", favoriteSong: "The Feels", funFact: "Setlist has become my workout playlist for several months." },
      { title: "Wishbone World Tour", youtubeId: "4-VDulM2GVs", image: "/images/concerts/wishbone_world_tour.png", artist: "Conan Gray", venue: "Prudential Center", city: "Newark, NJ", date: "Feb 27, 2026", purchaseMethod: "Ticketmaster", purchaseTiming: "Week Of", category: "Pop", thoughts: "Loved the sailor theme throughout.", favoriteSong: "Wish You Were Sober", funFact: "Our row was released during random afternoon drop - bots got every seat except ours." },
      { title: "The MAYHEM Ball", youtubeId: "XMfMK5laeNA", image: "/images/concerts/the_mayhem_ball.png", artist: "Lady Gaga", venue: "Madison Square Garden", city: "New York, NY", date: "Mar 18, 2026", purchaseMethod: "Ticketmaster", purchaseTiming: "Day Of", category: "Pop", thoughts: "What an insane catalog of hits.", favoriteSong: "The Edge of Glory", funFact: "When Gaga was at the B-stage, folks nearby left their seats to be closer - I got to move around." },
      { title: "Little Miss Drama Tour", youtubeId: "pfMTQIaVPz0", image: "/images/concerts/little_miss_drama_tour.png", artist: "Cardi B", venue: "Madison Square Garden", city: "New York, NY", date: "Mar 26, 2026", purchaseMethod: "Box Office", purchaseTiming: "Week Of", category: "Rap", thoughts: "Gives everything into performance.", favoriteSong: "Be Careful", funFact: "The row we found was pretty empty the entire time." },
    ];

    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const parseDate = d => new Date(d.replace(/\s&\s\d+/, ''));
    concerts.sort((a, b) => parseDate(b.date) - parseDate(a.date));

    // ── FILTERS ──
    const filterFields = ['artist', 'year', 'venue', 'city', 'category'];
    const activeFilters = {};

    function getUnique(field) {
      if (field === 'year') {
        return [...new Set(concerts.map(c => parseDate(c.date).getFullYear()))].sort((a, b) => b - a);
      }
      return [...new Set(concerts.map(c => c[field]))].sort();
    }

    filterFields.forEach(field => {
      const sel = document.getElementById(`filter-${field}`);
      getUnique(field).forEach(val => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = val;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        activeFilters[field] = sel.value;
        updateFilters();
      });
    });

    document.getElementById('filter-clear').addEventListener('click', () => {
      filterFields.forEach(field => {
        activeFilters[field] = '';
        document.getElementById(`filter-${field}`).value = '';
      });
      updateFilters();
    });

    function getFiltered() {
      return concerts.filter(c => {
        const year = parseDate(c.date).getFullYear();
        return (!activeFilters.artist   || c.artist   === activeFilters.artist) &&
               (!activeFilters.year     || year == activeFilters.year) &&
               (!activeFilters.venue    || c.venue    === activeFilters.venue) &&
               (!activeFilters.city     || c.city     === activeFilters.city) &&
               (!activeFilters.category || c.category === activeFilters.category);
      });
    }

    function renderGrid(filtered) {
      const grid = document.getElementById('concert-grid');
      grid.innerHTML = '';
      let currentYear = null;
      filtered.forEach(c => {
        const i = concerts.indexOf(c);
        const year = parseDate(c.date).getFullYear();
        if (year !== currentYear) {
          grid.insertAdjacentHTML('beforeend', `<div class="year-divider"><span>${year}</span></div>`);
          currentYear = year;
        }
        grid.insertAdjacentHTML('beforeend', `
          <article class="video-card" data-index="${i}">
            <div class="card-thumb">
              <img src="${c.image}" onerror="this.onerror=null;this.src='https://img.youtube.com/vi/${c.youtubeId}/hqdefault.jpg'" alt="${esc(c.title)}" loading="lazy" />
              <a class="card-yt-link" href="https://www.youtube.com/watch?v=${c.youtubeId}" target="_blank" rel="noopener noreferrer" aria-label="Watch on YouTube" title="Watch on YouTube">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.2 31.2 0 0 0 0 12a31.2 31.2 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.2 31.2 0 0 0 24 12a31.2 31.2 0 0 0-.5-5.8zM9.75 15.5V8.5l6.25 3.5-6.25 3.5z"/></svg>
              </a>
              <div class="card-date">${c.date.replace(/,?\s\d{4}$/, '').toUpperCase()}</div>
              <div class="card-overlay">
                <p class="card-artist">${esc(c.artist)}</p>
                <p class="card-title">${esc(c.title)}</p>
              </div>
            </div>
          </article>
        `);
      });
      const hasActive = filterFields.some(f => activeFilters[f]);
      document.getElementById('count').textContent = hasActive
        ? `${filtered.length} of ${concerts.length} videos`
        : `${concerts.length} videos`;
    }

    function updateFilters() {
      const hasActive = filterFields.some(f => activeFilters[f]);
      document.getElementById('filter-clear').classList.toggle('visible', hasActive);
      filterFields.forEach(field => {
        document.getElementById(`filter-${field}`).classList.toggle('active', !!activeFilters[field]);
      });
      renderGrid(getFiltered());
    }

    renderGrid(concerts);

    document.getElementById('concert-grid').addEventListener('click', e => {
      if (e.target.closest('.card-yt-link')) return;
      const card = e.target.closest('.video-card');
      if (!card) return;
      const c = concerts[card.dataset.index];
      document.getElementById('modal-iframe').src =
        `https://www.youtube.com/embed/${c.youtubeId}?autoplay=1`;
      document.getElementById('modal-title').textContent = c.title;
      document.getElementById('modal-artist').textContent = c.artist;
      document.getElementById('modal-venue').textContent = `${c.venue}, ${c.city}`;
      document.getElementById('modal-date').textContent = c.date;
      document.getElementById('modal-category').textContent = c.category;
      document.getElementById('modal-purchase-method').textContent = c.purchaseMethod;
      document.getElementById('modal-purchase-timing').textContent = c.purchaseTiming;
      document.getElementById('modal-thoughts').textContent = c.thoughts;
      document.getElementById('modal-favorite-song').textContent = c.favoriteSong;
      document.getElementById('modal-fun-fact').textContent = c.funFact;
      document.getElementById('modal-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
      document.getElementById('modal-iframe').src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-backdrop').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
